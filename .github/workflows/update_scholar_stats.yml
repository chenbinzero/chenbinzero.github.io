name: Update Google Scholar Stats

on:
  schedule:
    - cron: '0 6 1 * *'   # 1st of every month at 06:00 UTC
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scholarly
        run: pip install scholarly

      - name: Fetch Google Scholar stats
        run: |
          python3 << 'PYTHON'
          from scholarly import scholarly
          import json, sys
          from datetime import datetime

          SCHOLAR_ID = "H001jmIAAAAJ"

          try:
              print(f"Fetching stats for {SCHOLAR_ID}...")
              author = scholarly.search_author_id(SCHOLAR_ID)
              scholarly.fill(author, sections=['basics', 'indices'])

              data = {
                  "citations":    author.get("citedby",   0),
                  "hindex":       author.get("hindex",    0),
                  "i10index":     author.get("i10index",  0),
                  "last_updated": datetime.utcnow().strftime("%Y-%m-%d")
              }

              with open("_data/google_scholar_stats.json", "w") as f:
                  json.dump(data, f, indent=2)
                  f.write("\n")

              print(f"Success: {data}")

          except Exception as e:
              print(f"WARNING: Could not fetch scholar stats: {e}", file=sys.stderr)
              print("Keeping existing _data/google_scholar_stats.json unchanged.")
              sys.exit(0)   # don't fail the build
          PYTHON

      - name: Commit updated stats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/google_scholar_stats.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Google Scholar stats [skip ci]"
            git push
          fi
